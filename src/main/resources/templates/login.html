<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .header-box { background-color: #f4f4f4; padding: 10px;
          border-bottom: 1px solid #ddd; margin-bottom: 20px; }
        .login-container { border: 1px solid #ddd; padding: 0; max-width: 400px; }
        .form-content { padding: 20px; }
        button { background-color: #ff69b4; color: white; border: none;
          padding: 8px 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #ff1493; }
        input[type="text"], input[type="password"] {
          width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="header-box">
        <h3 style="margin:0;">Login Page</h3>
    </div>
    <div class="form-content">
        <form method="post" th:action="@{/login}">
            <label>Username:</label><br>
            <input type="text" name="username"/><br><br>
            <label>Password:</label><br>
            <input type="password" name="password"/><br><br>
            <button type="submit">Login</button>
        </form>
    </div>
</div>

<!-- Pop-up muncul otomatis kalau login gagal -->
<script th:if="${error}">
    window.onload = function() {
      alert("Login gagal! Username atau Password salah.\nSilakan coba lagi.");
    };
</script>
</body>
</html>
