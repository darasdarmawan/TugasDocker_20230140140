<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .welcome-box {
          background: linear-gradient(135deg, #ff69b4, #ff1493);
          color: white; padding: 20px; border-radius: 10px;
          display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
        }
        .welcome-box img {
          width: 80px; height: 80px;
          border-radius: 50%; border: 3px solid white;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #ff69b4; color: white; padding: 12px;
          text-align: center; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; }
        a { color: #ff69b4; text-decoration: none; }
    </style>
</head>
<body>

<div class="welcome-box">
    <img src="/image/maruko.jpg"
         onerror="this.src='https://ui-avatars.com/api/?name=Admin&background=ff69b4&color=fff'"
         alt="Foto Profil"/>
    <div>
        <h2 style="margin:0;">🎉 Login Berhasil!</h2>
        <p style="margin:5px 0;">Selamat datang, <strong>Admin</strong>!</p>
        <p style="margin:0; font-size:14px; opacity:0.9;">NIM: 20230140140</p>

        <!-- Tambahan kata-kata di bawah foto -->
        <p style="margin-top:10px; font-size:13px; opacity:0.85; font-style:italic;">
            "sebelum aktivitas dimulai kita kicau mania,<br>
            sambil yoga dulu like marukochan🌸"
        </p>
    </div>
</div>

<h3>MY Website 20230140140</h3>
<a th:href="@{/form}">+ Input Data Mahasiswa</a>
<br><br>

<b>Data Mahasiswa</b>
<table>
    <thead>
    <tr><th>No</th><th>Nama</th><th>NIM</th><th>Jenis Kelamin</th></tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(userList)}" style="background:#fff0f5; text-align:center;">
        <td colspan="4">Belum ada data</td>
    </tr>
    <tr th:each="user, i : ${userList}">
        <td align="center" th:text="${i.count}"></td>
        <td th:text="${user.nama}"></td>
        <td th:text="${user.nim}"></td>
        <td th:text="${user.jenisKelamin}"></td>
    </tr>
    </tbody>
</table>

<br>
<a th:href="@{/logout}" style="color:#ff1493;">Logout</a>
</body>
</html>
